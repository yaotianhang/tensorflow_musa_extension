name: Test Self-Hosted Runner

# 触发条件：允许在 GitHub 网页端手动触发，或者每次 push 代码时触发
on:
  workflow_dispatch: 
  push:
    branches:
      - main
      - master

jobs:
  test-job:
    # 这里的关键是 runs-on！
    # self-hosted 标签会让 GitHub 把任务发送到你刚刚配置的机器上
    runs-on: self-hosted

    steps:
      - name: 打印运行环境信息
        run: |
          echo "🎉 成功在这个自托管 Runner 上运行！"
          echo "当前用户是谁："
          whoami
          echo "当前所在的目录："
          pwd
          echo "服务器的主机名："
          hostname

      - name: 测试拉取代码
        uses: actions/checkout@v4

      - name: 列出仓库文件
        run: ls -la