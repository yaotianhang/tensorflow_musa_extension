              "threshold_ms": ", ".join(threshold_parts) if threshold_parts else "",
              "metrics_summary": " ; ".join(metrics_parts) if metrics_parts else "",
          }
          with open(compare_json, "w", encoding="utf-8") as f:
              json.dump(payload, f, ensure_ascii=False, indent=2)
          PY

          STATUS="$(python3 -c 'import json,sys; data=json.load(open(sys.argv[1], encoding="utf-8")); print(data.get("status","failure"))' "$COMPARE_JSON")"
          BASELINE_MS="$(python3 -c 'import json,sys; data=json.load(open(sys.argv[1], encoding="utf-8")); print(data.get("baseline_ms",""))' "$COMPARE_JSON")"
          CURRENT_MS="$(python3 -c 'import json,sys; data=json.load(open(sys.argv[1], encoding="utf-8")); print(data.get("current_ms",""))' "$COMPARE_JSON")"
          THRESHOLD_MS="$(python3 -c 'import json,sys; data=json.load(open(sys.argv[1], encoding="utf-8")); print(data.get("threshold_ms",""))' "$COMPARE_JSON")"
          METRICS_SUMMARY="$(python3 -c 'import json,sys; data=json.load(open(sys.argv[1], encoding="utf-8")); print(data.get("metrics_summary",""))' "$COMPARE_JSON")"

          if [[ "${{ steps.run_perf.outputs.baseline_exit }}" != "0" || "${{ steps.run_perf.outputs.current_exit }}" != "0" ]]; then
            STATUS="failure"
          fi

          {
            echo "## ByteDance Model 2"
            echo
            echo "- Status: $STATUS"
            echo "- Baseline: ${BASELINE_MS:-n/a}"
            echo "- Current: ${CURRENT_MS:-n/a}"
            echo "- Threshold: ${THRESHOLD_MS:-n/a}"
            echo
            echo "### Batch Size Comparison"
            cat "$DETAIL_FILE"
            echo
            echo "### Baseline log tail"
            echo '```text'
            if [[ -f "$BASELINE_LOG" ]]; then
              tail -20 "$BASELINE_LOG" || true
            else
              echo "baseline log not found"
            fi
            echo '```'
            echo
            echo "### Current log tail"
            echo '```text'
            if [[ -f "$CURRENT_LOG" ]]; then
              tail -20 "$CURRENT_LOG" || true
            else
              echo "current log not found"
            fi
            echo '```'
          } | tee "$SUMMARY_FILE"

          cat "$SUMMARY_FILE" >> "$GITHUB_STEP_SUMMARY"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "baseline_ms=$BASELINE_MS" >> "$GITHUB_OUTPUT"
          echo "current_ms=$CURRENT_MS" >> "$GITHUB_OUTPUT"
          echo "threshold_ms=$THRESHOLD_MS" >> "$GITHUB_OUTPUT"
          echo "metrics_summary=$METRICS_SUMMARY" >> "$GITHUB_OUTPUT"
          echo "summary_file=$SUMMARY_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload model 2 summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: summary-bytedance-model2
          path: ${{ steps.collect.outputs.summary_file }}
          if-no-files-found: error
          retention-days: 7

      - name: Fail job if model 2 regressed
        if: always() && steps.collect.outputs.status == 'failure'
        run: exit 1

  bytedance_model3:
    name: ByteDance Model 3
    needs: [prepare_metadata, build_current, build_baseline]
    if: needs.build_current.result == 'success' && needs.build_baseline.result == 'success'
    runs-on: [self-hosted, musa-gpu]
    timeout-minutes: 75
    outputs:
      status: ${{ steps.collect.outputs.status }}
      baseline_ms: ${{ steps.collect.outputs.baseline_ms }}
      current_ms: ${{ steps.collect.outputs.current_ms }}
      threshold_ms: ${{ steps.collect.outputs.threshold_ms }}
      metrics_summary: ${{ steps.collect.outputs.metrics_summary }}
      summary_file: ${{ steps.collect.outputs.summary_file }}
    steps:
      - name: Download current plugin
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.CURRENT_PLUGIN_ARTIFACT }}
          path: ${{ runner.temp }}/current-plugin

      - name: Download baseline plugin
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BASELINE_PLUGIN_ARTIFACT }}
          path: ${{ runner.temp }}/baseline-plugin

      - name: Run model 3 baseline/current
        id: run_perf
        run: |
          set +e

          JOB_LOG_DIR="${{ needs.prepare_metadata.outputs.log_root }}/bytedance-model3"
          BASELINE_LOG="$JOB_LOG_DIR/bytedance_model3_baseline.log"
          CURRENT_LOG="$JOB_LOG_DIR/bytedance_model3_current.log"
          BASELINE_PLUGIN="$RUNNER_TEMP/baseline-plugin/libmusa_plugin.so"
          CURRENT_PLUGIN="$RUNNER_TEMP/current-plugin/libmusa_plugin.so"
          SPEC_PATH="$MODEL_ROOT/inference/metaGraph/meta_graph/meta_graph_3.spec"
          mkdir -p "$JOB_LOG_DIR"

          baseline_exit=0
          current_exit=0

          export MODEL_ROOT JOB_LOG_DIR BASELINE_LOG CURRENT_LOG BASELINE_PLUGIN CURRENT_PLUGIN SPEC_PATH

          bash -l -c '
            [[ -e /home/runner/tf_test_model ]] || ln -s "$MODEL_ROOT" /home/runner/tf_test_model
            cd "$MODEL_ROOT/inference/metaGraph"
            exec timeout 30m python musa_run_pb_graph.py \
              --spec "$SPEC_PATH" \
              --bs 32,128,256,1024 \
              --out_root "$JOB_LOG_DIR/baseline-out" \
              --musa-plugin "$BASELINE_PLUGIN" > "$BASELINE_LOG" 2>&1
          ' || baseline_exit=$?

          bash -l -c '
            [[ -e /home/runner/tf_test_model ]] || ln -s "$MODEL_ROOT" /home/runner/tf_test_model
            cd "$MODEL_ROOT/inference/metaGraph"
            exec timeout 30m python musa_run_pb_graph.py \
              --spec "$SPEC_PATH" \
              --bs 32,128,256,1024 \
              --out_root "$JOB_LOG_DIR/current-out" \
              --musa-plugin "$CURRENT_PLUGIN" > "$CURRENT_LOG" 2>&1
          ' || current_exit=$?

          echo "baseline_exit=$baseline_exit" >> "$GITHUB_OUTPUT"
          echo "current_exit=$current_exit" >> "$GITHUB_OUTPUT"

      - name: Collect model 3 summary
        id: collect
        if: always()
        run: |
          set -euo pipefail

          JOB_LOG_DIR="${{ needs.prepare_metadata.outputs.log_root }}/bytedance-model3"
          BASELINE_LOG="$JOB_LOG_DIR/bytedance_model3_baseline.log"
          CURRENT_LOG="$JOB_LOG_DIR/bytedance_model3_current.log"
          SUMMARY_FILE="$RUNNER_TEMP/bytedance-model3.md"
          COMPARE_JSON="$RUNNER_TEMP/bytedance-model3-compare.json"
          DETAIL_FILE="$RUNNER_TEMP/bytedance-model3-details.md"
          STATUS="success"
          BASELINE_MS=""
          CURRENT_MS=""
          THRESHOLD_MS=""
          METRICS_SUMMARY=""
          BASELINE_REPORT=""
          CURRENT_REPORT=""

          if [[ -f "$BASELINE_LOG" ]]; then
            REPORT_PATH="$(grep '^\[OK\] report=' "$BASELINE_LOG" | tail -1 | sed 's/^\[OK\] report=//' || true)"
            if [[ -n "$REPORT_PATH" && -f "$REPORT_PATH" ]]; then
              BASELINE_REPORT="$REPORT_PATH"
            fi
          fi

          if [[ -f "$CURRENT_LOG" ]]; then
            REPORT_PATH="$(grep '^\[OK\] report=' "$CURRENT_LOG" | tail -1 | sed 's/^\[OK\] report=//' || true)"
            if [[ -n "$REPORT_PATH" && -f "$REPORT_PATH" ]]; then
              CURRENT_REPORT="$REPORT_PATH"
            fi
          fi

          python3 - "$BASELINE_REPORT" "$CURRENT_REPORT" "$COMPARE_JSON" "$DETAIL_FILE" <<'PY'
          import json
          import os
          import sys

          baseline_report, current_report, compare_json, detail_file = sys.argv[1:5]
          THRESHOLD_RATIO = 1.05

          def load_report(path, label):
              if not path:
                  return None, [f"{label} report path missing"]
              if not os.path.isfile(path):
                  return None, [f"{label} report not found: {path}"]
              try:
                  with open(path, "r", encoding="utf-8") as f:
                      return json.load(f), []
              except Exception as exc:
                  return None, [f"failed to load {label} report {path}: {exc}"]

          def collect_rows(report, label):
              rows = {}
              errors = []
              if report is None:
                  return rows, errors
              for item in report.get("average_time_summary", []):
                  bs = str(item.get("batch_size"))
                  if not bs or bs == "None":
                      errors.append(f"{label} report contains empty batch_size entry")
                      continue
                  if bs in rows:
                      errors.append(f"{label} report contains duplicate batch_size={bs}")
                      continue
                  rows[bs] = {
                      "status": item.get("status"),
                      "average_time_ms": item.get("average_time_ms"),
                      "error_core": item.get("error_core"),
                  }
              if not rows:
                  errors.append(f"{label} report has no average_time_summary entries")
              return rows, errors

          baseline_data, errors = load_report(baseline_report, "baseline")
          current_data, cur_errors = load_report(current_report, "current")
          errors.extend(cur_errors)

          baseline_rows, cur_errors = collect_rows(baseline_data, "baseline")
          errors.extend(cur_errors)
          current_rows, cur_errors = collect_rows(current_data, "current")
          errors.extend(cur_errors)

          def sort_key(bs):
              try:
                  return (0, int(bs))
              except Exception:
                  return (1, str(bs))

          all_bs = sorted(set(baseline_rows) | set(current_rows), key=sort_key)
          result_rows = []
          baseline_parts = []
          current_parts = []
          threshold_parts = []
          metrics_parts = []
          overall_status = "success"

          for bs in all_bs:
              base = baseline_rows.get(bs)
              cur = current_rows.get(bs)
              row = {
                  "batch_size": bs,
                  "baseline_ms": None,
                  "current_ms": None,
                  "threshold_ms": None,
                  "result": "ok",
                  "detail": "",
              }

              if base is None:
                  row["result"] = "missing-baseline"
                  row["detail"] = "baseline report missing this batch size"
              elif cur is None:
                  row["result"] = "missing-current"
                  row["detail"] = "current report missing this batch size"
              elif base.get("status") != "ok" or base.get("average_time_ms") is None:
                  row["result"] = "baseline-failed"
                  row["detail"] = base.get("error_core") or f"baseline status={base.get('status')}"
              elif cur.get("status") != "ok" or cur.get("average_time_ms") is None:
                  row["result"] = "current-failed"
                  row["detail"] = cur.get("error_core") or f"current status={cur.get('status')}"
              else:
                  row["baseline_ms"] = float(base["average_time_ms"])
                  row["current_ms"] = float(cur["average_time_ms"])
                  row["threshold_ms"] = float(base["average_time_ms"]) * THRESHOLD_RATIO
                  if row["current_ms"] > row["threshold_ms"]:
                      row["result"] = "regressed"
                      row["detail"] = "current > baseline * 1.05"

              if row["result"] != "ok":
                  overall_status = "failure"

              result_rows.append(row)
              baseline_parts.append(f"bs{bs}={'%.4f' % row['baseline_ms'] if row['baseline_ms'] is not None else 'n/a'}")
              current_parts.append(f"bs{bs}={'%.4f' % row['current_ms'] if row['current_ms'] is not None else 'n/a'}")
              threshold_parts.append(f"bs{bs}={'%.4f' % row['threshold_ms'] if row['threshold_ms'] is not None else 'n/a'}")
              metrics_parts.append(
                  "bs{bs}: baseline={base}, current={cur}, threshold={thr}, result={result}".format(
                      bs=bs,
                      base="%.4f" % row["baseline_ms"] if row["baseline_ms"] is not None else "n/a",
                      cur="%.4f" % row["current_ms"] if row["current_ms"] is not None else "n/a",
                      thr="%.4f" % row["threshold_ms"] if row["threshold_ms"] is not None else "n/a",
                      result=row["result"],
                  )
              )

          if errors:
              overall_status = "failure"

          with open(detail_file, "w", encoding="utf-8") as f:
              f.write("| BS | Baseline (ms) | Current (ms) | Threshold (ms) | Result | Detail |\n")
              f.write("|----|---------------|--------------|----------------|--------|--------|\n")
              for row in result_rows:
                  f.write(
                      "| {bs} | {base} | {cur} | {thr} | {result} | {detail} |\n".format(
                          bs=row["batch_size"],
                          base="%.4f" % row["baseline_ms"] if row["baseline_ms"] is not None else "n/a",
                          cur="%.4f" % row["current_ms"] if row["current_ms"] is not None else "n/a",
                          thr="%.4f" % row["threshold_ms"] if row["threshold_ms"] is not None else "n/a",
                          result=row["result"],
                          detail=(row["detail"] or "").replace("|", "/"),
                      )
                  )
              if errors:
                  f.write("\nAdditional errors:\n")
                  for err in errors:
                      f.write(f"- {err}\n")

          payload = {
              "status": overall_status,
              "baseline_ms": ", ".join(baseline_parts) if baseline_parts else "",
              "current_ms": ", ".join(current_parts) if current_parts else "",
              "threshold_ms": ", ".join(threshold_parts) if threshold_parts else "",
              "metrics_summary": " ; ".join(metrics_parts) if metrics_parts else "",
          }
          with open(compare_json, "w", encoding="utf-8") as f:
              json.dump(payload, f, ensure_ascii=False, indent=2)
          PY

          STATUS="$(python3 -c 'import json,sys; data=json.load(open(sys.argv[1], encoding="utf-8")); print(data.get("status","failure"))' "$COMPARE_JSON")"
          BASELINE_MS="$(python3 -c 'import json,sys; data=json.load(open(sys.argv[1], encoding="utf-8")); print(data.get("baseline_ms",""))' "$COMPARE_JSON")"
          CURRENT_MS="$(python3 -c 'import json,sys; data=json.load(open(sys.argv[1], encoding="utf-8")); print(data.get("current_ms",""))' "$COMPARE_JSON")"
          THRESHOLD_MS="$(python3 -c 'import json,sys; data=json.load(open(sys.argv[1], encoding="utf-8")); print(data.get("threshold_ms",""))' "$COMPARE_JSON")"
          METRICS_SUMMARY="$(python3 -c 'import json,sys; data=json.load(open(sys.argv[1], encoding="utf-8")); print(data.get("metrics_summary",""))' "$COMPARE_JSON")"

          if [[ "${{ steps.run_perf.outputs.baseline_exit }}" != "0" || "${{ steps.run_perf.outputs.current_exit }}" != "0" ]]; then
            STATUS="failure"
          fi

          {
            echo "## ByteDance Model 3"
            echo
            echo "- Status: $STATUS"
            echo "- Baseline: ${BASELINE_MS:-n/a}"
            echo "- Current: ${CURRENT_MS:-n/a}"
            echo "- Threshold: ${THRESHOLD_MS:-n/a}"
            echo
            echo "### Batch Size Comparison"
            cat "$DETAIL_FILE"
            echo
            echo "### Baseline log tail"
            echo '```text'
            if [[ -f "$BASELINE_LOG" ]]; then
              tail -20 "$BASELINE_LOG" || true
            else
              echo "baseline log not found"
            fi
            echo '```'
            echo
            echo "### Current log tail"
            echo '```text'
            if [[ -f "$CURRENT_LOG" ]]; then
              tail -20 "$CURRENT_LOG" || true
            else
              echo "current log not found"
            fi
            echo '```'
          } | tee "$SUMMARY_FILE"

          cat "$SUMMARY_FILE" >> "$GITHUB_STEP_SUMMARY"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "baseline_ms=$BASELINE_MS" >> "$GITHUB_OUTPUT"
          echo "current_ms=$CURRENT_MS" >> "$GITHUB_OUTPUT"
          echo "threshold_ms=$THRESHOLD_MS" >> "$GITHUB_OUTPUT"
          echo "metrics_summary=$METRICS_SUMMARY" >> "$GITHUB_OUTPUT"
          echo "summary_file=$SUMMARY_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload model 3 summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: summary-bytedance-model3
          path: ${{ steps.collect.outputs.summary_file }}
          if-no-files-found: error
          retention-days: 7

      - name: Fail job if model 3 regressed
        if: always() && steps.collect.outputs.status == 'failure'
        run: exit 1

  training:
    name: Training
    needs: [prepare_metadata, build_current]
    if: needs.build_current.result == 'success'
    runs-on: [self-hosted, musa-gpu]
    timeout-minutes: 210
    outputs:
      status: ${{ steps.collect.outputs.status }}
      summary_file: ${{ steps.collect.outputs.summary_file }}
    steps:
      - name: Download current plugin
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.CURRENT_PLUGIN_ARTIFACT }}
          path: ${{ runner.temp }}/current-plugin

      - name: Run training tests
        id: run_training
        run: |
          set +e

          JOB_LOG_DIR="${{ needs.prepare_metadata.outputs.log_root }}/training"
          LOG_FILE="$JOB_LOG_DIR/training_tests.log"
          ERROR_LOG_DIR="$JOB_LOG_DIR/error_logs"
          CURRENT_PLUGIN="$RUNNER_TEMP/current-plugin/libmusa_plugin.so"
          mkdir -p "$JOB_LOG_DIR"

          training_exit=0
          export LOG_FILE ERROR_LOG_DIR CURRENT_PLUGIN
          bash -l -c '
            cd "$MODEL_ROOT/training"
            exec timeout 180m python run_all_training_tests.py \
              --epochs 100 \
              --log-dir "$ERROR_LOG_DIR" \
              --musa-plugin "$CURRENT_PLUGIN" > "$LOG_FILE" 2>&1
          ' || training_exit=$?

          echo "training_exit=$training_exit" >> "$GITHUB_OUTPUT"

      - name: Collect training summary
        id: collect
        if: always()
        run: |
          set -euo pipefail

          JOB_LOG_DIR="${{ needs.prepare_metadata.outputs.log_root }}/training"
          LOG_FILE="$JOB_LOG_DIR/training_tests.log"
          SUMMARY_FILE="$RUNNER_TEMP/training.md"
          STATUS="success"

          if [[ "${{ steps.run_training.outputs.training_exit }}" != "0" ]]; then
            STATUS="failure"
          fi
          if [[ -f "$LOG_FILE" ]] && { grep -q '^\[FAIL\]' "$LOG_FILE" || grep -Eq '^失败:[[:space:]]*[1-9][0-9]*' "$LOG_FILE"; }; then
            STATUS="failure"
          fi

          {
            echo "## Training (Non-blocking)"
            echo
            echo "- Status: $STATUS"
            echo "- Log file: $LOG_FILE"
            echo
            echo '```text'
            if [[ -f "$LOG_FILE" ]]; then
              grep -E '^\[OK\]|^\[FAIL\]|^总计:|^成功:|^失败:|^  - ' "$LOG_FILE" || tail -80 "$LOG_FILE" || true
            else
              echo "training log not found"
            fi
            echo '```'
          } | tee "$SUMMARY_FILE"

          cat "$SUMMARY_FILE" >> "$GITHUB_STEP_SUMMARY"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "summary_file=$SUMMARY_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload training summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: summary-training
          path: ${{ steps.collect.outputs.summary_file }}
          if-no-files-found: error
          retention-days: 7

  summary:
    name: Final Summary
    needs:
      - prepare_metadata
      - format
      - build_current
      - integration
      - build_baseline
      - tencent_perf
      - tencent_accuracy
      - bytedance_model1
      - bytedance_model2
      - bytedance_model3
      - training
    if: ${{ always() && !cancelled() }}
    runs-on: [self-hosted, musa-gpu]
    timeout-minutes: 10
    env:
      DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
    steps:
      - name: Download summary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: summary-*
          merge-multiple: true
          path: ${{ runner.temp }}/ci-summary

      - name: Generate final summary
        id: final_summary
        run: |
          set -euo pipefail

          SUMMARY_FILE="$RUNNER_TEMP/final-summary.md"
          FORMAT_STATUS="${{ needs.format.outputs.status || 'skipped' }}"
          FORMAT_RESULT="${{ needs.format.result }}"
          FORMAT_DISPLAY="$FORMAT_STATUS"
          BUILD_CURRENT_STATUS="${{ needs.build_current.outputs.status || 'skipped' }}"
          BUILD_CURRENT_RESULT="${{ needs.build_current.result }}"
          INTEGRATION_STATUS="${{ needs.integration.outputs.status || 'skipped' }}"
          INTEGRATION_RESULT="${{ needs.integration.result }}"
          BUILD_BASELINE_STATUS="${{ needs.build_baseline.outputs.status || 'skipped' }}"
          BUILD_BASELINE_RESULT="${{ needs.build_baseline.result }}"
          TENCENT_PERF_STATUS="${{ needs.tencent_perf.outputs.status || 'skipped' }}"
          TENCENT_PERF_RESULT="${{ needs.tencent_perf.result }}"
          TENCENT_ACC_STATUS="${{ needs.tencent_accuracy.outputs.status || 'skipped' }}"
          TENCENT_ACC_RESULT="${{ needs.tencent_accuracy.result }}"
          BYTE1_STATUS="${{ needs.bytedance_model1.outputs.status || 'skipped' }}"
          BYTE1_RESULT="${{ needs.bytedance_model1.result }}"
          BYTE2_STATUS="${{ needs.bytedance_model2.outputs.status || 'skipped' }}"
          BYTE2_RESULT="${{ needs.bytedance_model2.result }}"
          BYTE3_STATUS="${{ needs.bytedance_model3.outputs.status || 'skipped' }}"
          BYTE3_RESULT="${{ needs.bytedance_model3.result }}"
          TRAINING_STATUS="${{ needs.training.outputs.status || 'skipped' }}"
          TRAINING_RESULT="${{ needs.training.result }}"
          BASELINE_SHA="${{ needs.build_baseline.outputs.baseline_sha || 'unavailable' }}"

          if [[ "$FORMAT_STATUS" == "failure" ]]; then
            FORMAT_DISPLAY="failure (non-blocking)"
          fi

          {
            echo "# CI Report"
            echo
            echo "- Commit: ${{ needs.prepare_metadata.outputs.commit_id }}"
            echo "- Run kind: ${{ needs.prepare_metadata.outputs.run_kind }}"
            echo "- Run id: ${{ needs.prepare_metadata.outputs.run_id }}"
            echo "- Baseline commit: $BASELINE_SHA"
            echo
            echo "## Job Status"
            echo "| Job | Result | Blocking |"
            echo "|-----|--------|----------|"
            echo "| Format | $FORMAT_DISPLAY | no |"
            echo "| Build Current | $BUILD_CURRENT_STATUS | yes |"
            echo "| Integration | $INTEGRATION_STATUS | yes |"
            echo "| Build Baseline | $BUILD_BASELINE_STATUS | yes |"
            echo "| Tencent Performance | $TENCENT_PERF_STATUS | yes |"
            echo "| Tencent Accuracy | $TENCENT_ACC_STATUS | yes |"
            echo "| ByteDance Model 1 | $BYTE1_STATUS | yes |"
            echo "| ByteDance Model 2 | $BYTE2_STATUS | yes |"
            echo "| ByteDance Model 3 | $BYTE3_STATUS | yes |"
            echo "| Training | $TRAINING_STATUS | no |"
            echo
            echo "## Performance Metrics"
            echo "- Tencent Performance: baseline=${{ needs.tencent_perf.outputs.baseline_ms || 'n/a' }} ms, current=${{ needs.tencent_perf.outputs.current_ms || 'n/a' }} ms, threshold=${{ needs.tencent_perf.outputs.threshold_ms || 'n/a' }} ms"
            echo "- ByteDance Model 1: ${{ needs.bytedance_model1.outputs.metrics_summary || 'n/a' }}"
            echo "- ByteDance Model 2: ${{ needs.bytedance_model2.outputs.metrics_summary || 'n/a' }}"
            echo "- ByteDance Model 3: ${{ needs.bytedance_model3.outputs.metrics_summary || 'n/a' }}"
            echo
            echo "## Accuracy Highlights"
            echo "- Tencent Accuracy current: ${{ needs.tencent_accuracy.outputs.current_acc || 'n/a' }}"
            echo
          } > "$SUMMARY_FILE"

          for file in \
            "$RUNNER_TEMP/ci-summary/prepare-metadata.md" \
            "$RUNNER_TEMP/ci-summary/format.md" \
            "$RUNNER_TEMP/ci-summary/build-current.md" \
            "$RUNNER_TEMP/ci-summary/integration.md" \
            "$RUNNER_TEMP/ci-summary/build-baseline.md" \
            "$RUNNER_TEMP/ci-summary/tencent-perf.md" \
            "$RUNNER_TEMP/ci-summary/tencent-accuracy.md" \
            "$RUNNER_TEMP/ci-summary/bytedance-model1.md" \
            "$RUNNER_TEMP/ci-summary/bytedance-model2.md" \
            "$RUNNER_TEMP/ci-summary/bytedance-model3.md" \
            "$RUNNER_TEMP/ci-summary/training.md"; do
            if [[ -f "$file" ]]; then
              echo >> "$SUMMARY_FILE"
              cat "$file" >> "$SUMMARY_FILE"
            fi
          done

          echo "===== Final CI Summary ====="
          cat "$SUMMARY_FILE"
          cat "$SUMMARY_FILE" >> "$GITHUB_STEP_SUMMARY"

          BLOCKING_FAILURE=0
          if [[ "$BUILD_CURRENT_STATUS" == "failure" || "$BUILD_CURRENT_RESULT" == "failure" ]]; then BLOCKING_FAILURE=1; fi
          if [[ "$INTEGRATION_STATUS" == "failure" || "$INTEGRATION_RESULT" == "failure" ]]; then BLOCKING_FAILURE=1; fi
          if [[ "$BUILD_BASELINE_STATUS" == "failure" || "$BUILD_BASELINE_RESULT" == "failure" ]]; then BLOCKING_FAILURE=1; fi
          if [[ "$TENCENT_PERF_STATUS" == "failure" || "$TENCENT_PERF_RESULT" == "failure" ]]; then BLOCKING_FAILURE=1; fi
          if [[ "$TENCENT_ACC_STATUS" == "failure" || "$TENCENT_ACC_RESULT" == "failure" ]]; then BLOCKING_FAILURE=1; fi
          if [[ "$BYTE1_STATUS" == "failure" || "$BYTE1_RESULT" == "failure" ]]; then BLOCKING_FAILURE=1; fi
          if [[ "$BYTE2_STATUS" == "failure" || "$BYTE2_RESULT" == "failure" ]]; then BLOCKING_FAILURE=1; fi
          if [[ "$BYTE3_STATUS" == "failure" || "$BYTE3_RESULT" == "failure" ]]; then BLOCKING_FAILURE=1; fi

          if [[ "$BLOCKING_FAILURE" -ne 0 ]]; then
            FINAL_STATUS="failure"
          else
            FINAL_STATUS="success"
          fi

          echo "final_status=$FINAL_STATUS" >> "$GITHUB_OUTPUT"
          echo "summary_file=$SUMMARY_FILE" >> "$GITHUB_OUTPUT"

      - name: Send DingTalk notification
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail

          if [[ -z "${DINGTALK_WEBHOOK:-}" ]]; then
            echo "DINGTALK_WEBHOOK is not configured, skip notification."
            exit 0
          fi

          FINAL_STATUS="${{ steps.final_summary.outputs.final_status }}"
          COMMIT_ID="${{ needs.prepare_metadata.outputs.commit_id }}"
          SHORT_COMMIT="${COMMIT_ID:0:8}"
          RUN_KIND="${{ needs.prepare_metadata.outputs.run_kind }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          REF_NAME="${{ github.ref_name }}"
          REPOSITORY="${{ github.repository }}"
          BASELINE_SHA="${{ needs.build_baseline.outputs.baseline_sha || 'unavailable' }}"
          PR_NUMBER="${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}"
          PR_URL="${{ github.event_name == 'pull_request' && github.event.pull_request.html_url || '' }}"
          FORMAT_STATUS="${{ needs.format.outputs.status || 'skipped' }}"
          BUILD_CURRENT_STATUS="${{ needs.build_current.outputs.status || 'skipped' }}"
          INTEGRATION_STATUS="${{ needs.integration.outputs.status || 'skipped' }}"
          BUILD_BASELINE_STATUS="${{ needs.build_baseline.outputs.status || 'skipped' }}"
          TENCENT_PERF_STATUS="${{ needs.tencent_perf.outputs.status || 'skipped' }}"
          TENCENT_ACC_STATUS="${{ needs.tencent_accuracy.outputs.status || 'skipped' }}"
          BYTE1_STATUS="${{ needs.bytedance_model1.outputs.status || 'skipped' }}"
          BYTE2_STATUS="${{ needs.bytedance_model2.outputs.status || 'skipped' }}"
          BYTE3_STATUS="${{ needs.bytedance_model3.outputs.status || 'skipped' }}"
          TRAINING_STATUS="${{ needs.training.outputs.status || 'skipped' }}"

          if [[ "$FINAL_STATUS" == "success" ]]; then
            STATUS_ICON="SUCCESS"
            STATUS_TEXT="成功"
          else
            STATUS_ICON="FAILURE"
            STATUS_TEXT="失败"
          fi

          if [[ -n "$PR_NUMBER" ]]; then
            PR_LINE="- PR: #${PR_NUMBER} ${PR_URL}"
          else
            PR_LINE="- PR: n/a"
          fi

          export STATUS_ICON STATUS_TEXT REPOSITORY REF_NAME RUN_KIND SHORT_COMMIT RUN_URL PR_LINE
          export BASELINE_SHA FORMAT_STATUS BUILD_CURRENT_STATUS INTEGRATION_STATUS BUILD_BASELINE_STATUS
          export TENCENT_PERF_STATUS TENCENT_ACC_STATUS BYTE1_STATUS BYTE2_STATUS BYTE3_STATUS TRAINING_STATUS

          PAYLOAD="$(python3 - <<'PY'
          import json
          import os

          status_icon = os.environ["STATUS_ICON"]
          status_text = os.environ["STATUS_TEXT"]
          repo = os.environ["REPOSITORY"]
          ref_name = os.environ["REF_NAME"]
          run_kind = os.environ["RUN_KIND"]
          short_commit = os.environ["SHORT_COMMIT"]
          run_url = os.environ["RUN_URL"]
          pr_line = os.environ["PR_LINE"]
          baseline_sha = os.environ["BASELINE_SHA"]
          format_status = os.environ["FORMAT_STATUS"]
          build_current_status = os.environ["BUILD_CURRENT_STATUS"]
          integration_status = os.environ["INTEGRATION_STATUS"]
          build_baseline_status = os.environ["BUILD_BASELINE_STATUS"]
          tencent_perf_status = os.environ["TENCENT_PERF_STATUS"]
          tencent_acc_status = os.environ["TENCENT_ACC_STATUS"]
          byte1_status = os.environ["BYTE1_STATUS"]
          byte2_status = os.environ["BYTE2_STATUS"]
          byte3_status = os.environ["BYTE3_STATUS"]
          training_status = os.environ["TRAINING_STATUS"]

          title = f"CI {status_icon}: {repo}@{ref_name}"
          text = "\n".join(
              [
                  f"### CI通知: {status_text}",
                  f"- 仓库: {repo}",
                  f"- 分支: {ref_name}",
                  f"- Commit: `{short_commit}`",
                  f"- 触发方式: {run_kind}",
                  pr_line,
                  f"- Baseline commit: `{baseline_sha}`",
                  f"- 运行详情: [GitHub Actions]({run_url})",
                  "",
                  "#### Job 状态",
                  f"- Format: {format_status}",
                  f"- Build Current: {build_current_status}",
                  f"- Integration: {integration_status}",
                  f"- Build Baseline: {build_baseline_status}",
                  f"- Tencent Performance: {tencent_perf_status}",
                  f"- Tencent Accuracy: {tencent_acc_status}",
                  f"- ByteDance Model 1: {byte1_status}",
                  f"- ByteDance Model 2: {byte2_status}",
                  f"- ByteDance Model 3: {byte3_status}",
                  f"- Training: {training_status}",
              ]
          )

          print(
              json.dumps(
                  {
                      "msgtype": "markdown",
                      "markdown": {
                          "title": title,
                          "text": text,
                      },
                  },
                  ensure_ascii=False,
              )
          )
          PY
          )"

          curl -fsSL \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD" \
            "$DINGTALK_WEBHOOK"

      - name: Fail job if blocking checks failed
        if: always() && steps.final_summary.outputs.final_status == 'failure'
        run: exit 1
